services:
  postgres:
    image: postgres:17-alpine
    container_name: trade-app-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trade_app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trade_app}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
